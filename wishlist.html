<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist – ShopWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="header-placeholder"></div>
<div class="page-header">
  <div class="container">
    <h1>My Wishlist</h1>
    <div class="breadcrumb"><a href="index.html">Home</a> › Wishlist</div>
  </div>
</div>
<div class="container" style="padding:48px 0">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px">
    <div id="wishCount" style="font-size:16px;color:var(--gray-600)"></div>
    <button class="btn btn-outline btn-sm" onclick="if(confirm('Clear wishlist?')){Wishlist.items=[];Wishlist.save();render();}">🗑 Clear Wishlist</button>
  </div>
  <div id="wishContent"></div>
</div>
<div id="footer-placeholder"></div>
<script src="js/app.js"></script>
<script>
document.getElementById('header-placeholder').innerHTML = buildHeader();
document.getElementById('footer-placeholder').innerHTML = buildFooter();

function render() {
  const prods = PRODUCTS.filter(p => Wishlist.items.includes(p.id));
  document.getElementById('wishCount').textContent = `${prods.length} item${prods.length!==1?'s':''} in your wishlist`;
  document.getElementById('wishContent').innerHTML = prods.length
    ? `<div class="products-grid">${prods.map(p=>renderProductCard(p)).join('')}</div>`
    : `<div class="empty-state"><div class="empty-state-icon">💔</div><h3>Your wishlist is empty</h3><p>Save your favorite products and shop later</p><a href="products.html" class="btn btn-primary">Browse Products</a></div>`;
}

// Override toggleWishlist to re-render
const _toggle = toggleWishlist;
window.toggleWishlist = function(id, btn) { _toggle(id, btn); setTimeout(render, 100); };

render();
</script>
</body>
</html>
